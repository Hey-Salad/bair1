name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FAILED=0

          FILES=$(git ls-files -- '*.ts' '*.js' '*.json' '*.toml' \
            ':!node_modules' ':!package-lock.json')

          PATTERNS=(
            '[0-9a-f]{64}'
            'AKIA[0-9A-Z]{16}'
            'sk_live_[a-zA-Z0-9]+'
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$FILES" | xargs grep -lPn "$pattern" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Potential secret matching /$pattern/ in: $MATCHES"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Secret scan failed."
            exit 1
          fi

          echo "No secrets found."

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            UPSTREAM_URL
            UPSTREAM_API_KEY
        env:
          UPSTREAM_URL: ${{ secrets.UPSTREAM_URL }}
          UPSTREAM_API_KEY: ${{ secrets.UPSTREAM_API_KEY }}
